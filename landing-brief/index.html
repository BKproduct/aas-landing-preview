<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title data-i18n-doc="title">Бриф на конверсионный лендинг</title>
  <meta name="description" content="Заполните бриф и отправьте ссылку или файл Борису." data-i18n-meta="description" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/lz-string@1.5.0/libs/lz-string.min.js"></script>
  <style>
    :root {
      --paper: #fafaf7;
      --ink: #0a0a0a;
      --muted: #6b6b68;
      --rule: #e5e4de;
      --accent: #ff3d2e;
      --accent-soft: rgba(255, 61, 46, 0.08);
      --ok: #16a34a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Geist", system-ui, sans-serif;
      background: var(--paper);
      color: var(--ink);
      line-height: 1.55;
      font-size: 16px;
    }
    .wrap { max-width: 760px; margin: 0 auto; padding: 48px 24px 120px; }
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }
    .lang-switch {
      display: inline-flex;
      border: 1px solid var(--ink);
    }
    .lang-switch button {
      appearance: none;
      border: none;
      background: transparent;
      color: var(--ink);
      font: inherit;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.06em;
      padding: 10px 16px;
      cursor: pointer;
    }
    .lang-switch button.active {
      background: var(--ink);
      color: #fff;
    }
    .lang-switch button:hover:not(.active) {
      background: var(--accent-soft);
    }
    .kicker {
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
    }
    h1 {
      font-size: clamp(28px, 5vw, 40px);
      line-height: 1.05;
      letter-spacing: -0.03em;
      margin: 0 0 16px;
      font-weight: 700;
    }
    .lead { color: var(--muted); margin: 0 0 28px; max-width: 62ch; }
    .steps {
      display: grid;
      gap: 10px;
      margin: 0 0 32px;
      padding: 20px;
      border: 1px solid var(--rule);
      background: #fff;
    }
    .steps li { margin-left: 18px; }
    .steps strong { color: var(--ink); }
    .toolbar {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      padding: 14px 0;
      margin-bottom: 24px;
      background: linear-gradient(var(--paper) 70%, transparent);
      border-bottom: 1px solid var(--rule);
    }
    button.action {
      appearance: none;
      border: 1px solid var(--ink);
      background: var(--ink);
      color: #fff;
      font: inherit;
      font-size: 14px;
      font-weight: 600;
      padding: 12px 18px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    button.action.secondary {
      background: transparent;
      color: var(--ink);
    }
    button.action:hover { background: var(--accent); border-color: var(--accent); color: #fff; }
    .status {
      flex: 1 1 100%;
      font-size: 13px;
      color: var(--muted);
      min-height: 1.2em;
    }
    .status.ok { color: var(--ok); }
    .status.err { color: var(--accent); }
    section.block {
      margin-bottom: 40px;
      padding-top: 8px;
      border-top: 1px solid var(--rule);
    }
    section.block h2 {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      margin: 24px 0 20px;
      font-weight: 600;
    }
    label.field {
      display: block;
      margin-bottom: 22px;
    }
    label.field span.lbl {
      display: block;
      font-weight: 600;
      margin-bottom: 6px;
      font-size: 15px;
    }
    label.field small.hint {
      display: block;
      color: var(--muted);
      font-weight: 400;
      margin-bottom: 8px;
      font-size: 13px;
    }
    input[type="text"],
    input[type="email"],
    textarea,
    select {
      width: 100%;
      border: 1px solid var(--rule);
      background: #fff;
      padding: 12px 14px;
      font: inherit;
      color: var(--ink);
      border-radius: 0;
    }
    textarea { min-height: 88px; resize: vertical; }
    textarea.tall { min-height: 120px; }
    .field.hidden { display: none; }
    .field-nested {
      margin-top: -8px;
      padding-left: 14px;
      border-left: 2px solid var(--accent);
    }
    @media (max-width: 600px) {
      .toolbar { position: static; }
    }
    .filled-banner {
      display: none;
      padding: 14px 16px;
      margin-bottom: 24px;
      border: 1px solid var(--accent);
      background: var(--accent-soft);
      font-size: 14px;
    }
    .filled-banner.show { display: block; }
    footer {
      margin-top: 48px;
      padding-top: 24px;
      border-top: 1px solid var(--rule);
      font-size: 13px;
      color: var(--muted);
    }
  </style>
</head>
<body>

      </section>

      <section class="block">

        <label class="field" data-f="q44"><span class="lbl"></span><textarea name="q44_extra"></textarea></label>

    </form>

        q06: { label: '6. Strongest proof', hint: 'Cases, metrics, reviews — what can be shown publicly.' },
        q07: { label: '7. Forbidden claims / wording' },
        q08: { label: '8. Landing page language' },
        q08d: { label: 'Which languages?', hint: 'List all landing languages, comma-separated.', ph: 'e.g. Russian, English, German' },
        q09: { label: '9. Brand name (as on site)' },
        q10: { label: '10. Target audience', hint: 'Role, geography, situation, “stuck at X → wants Y”.' },
        q11: { label: '11. Category (how buyers search)', ph: 'e.g. automation agency, online course…' },
        q12: { label: '12. Differentiators vs competitors (1–3)' },
        q13: { label: '13. What is included' },
        q14: { label: '14. Bonuses' },
        q15: { label: '15. Guarantees (what you will actually sign)' },
        q16: { label: '16. Urgency / scarcity (real only)' },
        q17: { label: '17. Payment / subsidy mechanism (if any)', hint: 'Describe in 3 steps if applicable.' },
        q18: { label: '18. Brand face on the landing', ph: 'founder / expert / team' },
        q19: { label: '19. Founder story (short)', hint: 'Origin → what broke → insight → what you built → result.' },
        q20: { label: '20. Tone of voice' },
        q21: { label: '21. Top 5 pains (verbatim customer phrases)' },
        q22: { label: '22. Top objections + how you respond' },
        q23: { label: '23. Purchase trigger' },
        q24: { label: '24. Proof — what you already have' },
        q25: { label: '25. Proof — ready within 2 weeks' },
        q26: { label: '26. What you must not invent' },
        q27: { label: '27. Primary CTA on landing', ph: 'form / 15-min call / WhatsApp…' },
        q28: { label: '28. What happens after click (3 steps)' },
        q29: { label: '29. Form fields', ph: 'name, phone, email…' },
        q30: { label: '30. Where leads go' },
        q31: { label: '31. References (links you like)' },
        q32: { label: '32. Anti-references' },
        q33: { label: '33. Assets (logo, photos, brand book)', hint: 'Drive/Dropbox links or “will send separately”.' },
        q34: { label: '34. Hero visual' },
        q35: { label: '35. Legal entity (company, address, country)' },
        q36: { label: '36. Legal pages (privacy, terms…)' },
        q37: { label: '37. Domain' },
        q38: { label: '38. Analytics', ph: 'Meta Pixel, GA4, PostHog…' },
        q39: { label: '39. Three customer personas (if any)' },
        q40: { label: '40. Lead magnet' },
        q41: { label: '41. FAQ (question → answer)' },
        q42: { label: '42. Competitors to compare (URLs)' },
        q43: { label: '43. Landing success metrics' },
        q44: { label: '44. Anything else' },
      },
    };

    const EXPORT_KEYS = [
      ['contact', 'contact'], ['email', 'email'],
      ['q01_product', 'q01'], ['q02_outcome', 'q02'], ['q03_not_for', 'q03'],
      ['q04_competitors', 'q04'], ['q05_pricing', 'q05'], ['q06_proof', 'q06'],
      ['q07_forbidden', 'q07'], ['q08_language', 'q08'],
      ['q09_brand', 'q09'], ['q10_audience', 'q10'], ['q11_category', 'q11'],
      ['q12_differentiator', 'q12'], ['q13_includes', 'q13'], ['q14_bonuses', 'q14'],
      ['q15_guarantees', 'q15'], ['q16_scarcity', 'q16'], ['q17_funding', 'q17'],
      ['q18_face', 'q18'], ['q19_story', 'q19'], ['q20_tone', 'q20'],
      ['q21_pains', 'q21'], ['q22_objections', 'q22'], ['q23_trigger', 'q23'],
      ['q24_proof_have', 'q24'], ['q25_proof_soon', 'q25'], ['q26_proof_no', 'q26'],
      ['q27_cta', 'q27'], ['q28_after_click', 'q28'], ['q29_form_fields', 'q29'],
      ['q30_leads', 'q30'], ['q31_refs', 'q31'], ['q32_antirefs', 'q32'],
      ['q33_assets', 'q33'], ['q34_hero_visual', 'q34'], ['q35_legal', 'q35'],
      ['q36_legal_pages', 'q36'], ['q37_domain', 'q37'], ['q38_analytics', 'q38'],
      ['q39_personas', 'q39'], ['q40_lead_magnet', 'q40'], ['q41_faq', 'q41'],
      ['q42_comp_urls', 'q42'], ['q43_metrics', 'q43'], ['q44_extra', 'q44'],
    ];

    let locale = localStorage.getItem(LOCALE_KEY) || 'ru';
    const form = document.getElementById('briefForm');
    const status = document.getElementById('status');
    const filledBanner = document.getElementById('filledBanner');
    const emptyLink = document.getElementById('emptyLink');
    const baseUrl = location.origin + location.pathname;

    emptyLink.href = baseUrl;

    function t() { return PACK[locale]; }
    function f() { return FIELDS[locale]; }

    function setLocale(next) {
      locale = next;
      localStorage.setItem(LOCALE_KEY, locale);
      document.documentElement.lang = locale === 'en' ? 'en' : 'ru';
      document.title = t().docTitle;
      const meta = document.querySelector('meta[name="description"]');
      if (meta) meta.content = t().metaDesc;

      document.getElementById('langRu').classList.toggle('active', locale === 'ru');
      document.getElementById('langEn').classList.toggle('active', locale === 'en');
      document.getElementById('langRu').setAttribute('aria-pressed', locale === 'ru');
      document.getElementById('langEn').setAttribute('aria-pressed', locale === 'en');

      document.querySelectorAll('[data-i18n]').forEach((el) => {
        const key = el.getAttribute('data-i18n');
        if (t()[key] != null) el.textContent = t()[key];
      });
      document.querySelectorAll('[data-i18n-html]').forEach((el) => {
        el.innerHTML = t()[el.getAttribute('data-i18n-html')];
      });

      const steps = document.getElementById('stepsList');
      steps.innerHTML = t().steps.map((s) => `<li>${s}</li>`).join('');

      document.querySelectorAll('[data-f]').forEach((wrap) => {
        const key = wrap.getAttribute('data-f');
        const def = f()[key];
        if (!def) return;
        const lbl = wrap.querySelector('.lbl');
        const hint = wrap.querySelector('.hint');
        const inp = wrap.querySelector('input, textarea, select');
        if (lbl) lbl.textContent = def.label;
        if (hint) {
          hint.textContent = def.hint || '';
          hint.style.display = def.hint ? '' : 'none';
        }
        if (inp && def.ph) inp.placeholder = def.ph;
      });

      fillQ08Options();
      syncLanguageFields();
    }

    function fillQ08Options() {
      const sel = document.getElementById('q08Language');
      if (!sel) return;
      const cur = sel.value;
      const opts = t().q08opts;
      sel.innerHTML = Object.entries(opts).map(([v, label]) =>
        `<option value="${v}">${label}</option>`
      ).join('');
      sel.value = Object.prototype.hasOwnProperty.call(opts, cur) ? cur : '';
    }

    function collectData() {
      const data = { _v: 2, _saved: new Date().toISOString(), _uiLocale: locale };
      new FormData(form).forEach((val, key) => { data[key] = String(val).trim(); });
      return data;
    }

    function applyData(data) {
      if (!data) return;
      if (data._uiLocale && PACK[data._uiLocale]) setLocale(data._uiLocale);
      Object.entries(data).forEach(([key, val]) => {
        if (key.startsWith('_')) return;
        const el = form.elements.namedItem(key);
        if (el) el.value = val;
      });
      fillQ08Options();
      const sel = document.getElementById('q08Language');
      if (sel && data.q08_language) sel.value = data.q08_language;
      syncLanguageFields();
    }

    function encodePayload(data) {
      return LZString.compressToEncodedURIComponent(JSON.stringify(data));
    }

    function decodePayload(encoded) {
      try {
        const json = LZString.decompressFromEncodedURIComponent(encoded);
        return json ? JSON.parse(json) : null;
      } catch { return null; }
    }

    function formatLanguageAnswer(data) {
      const main = (data.q08_language || '').trim();
      const detail = (data.q08_languages_detail || '').trim();
      const loc = data._uiLocale && PACK[data._uiLocale] ? data._uiLocale : locale;
      if (main === 'multi') return PACK[loc].langMultiList(detail);
      return (PACK[loc].q08opts[main] || main);
    }

    function toMarkdown(data) {
      const loc = data._uiLocale && PACK[data._uiLocale] ? data._uiLocale : locale;
      const P = PACK[loc];
      const F = FIELDS[loc];
      const lines = [
        `# ${P.mdTitle}`,
        '',
        `**${P.mdFilled}:** ${data._saved || '—'}`,
        `**${P.mdContact}:** ${data.contact || '—'}`,
        `**Email:** ${data.email || '—'}`,
        '',
        '---',
        '',
      ];
      EXPORT_KEYS.forEach(([name, fk]) => {
        let val = (data[name] || '').trim();
        if (name === 'q08_language') val = formatLanguageAnswer(data);
        lines.push(`## ${F[fk].label}`);
        lines.push('');
        lines.push(val || `_${P.mdEmpty}_`);
        lines.push('');
      });
      return lines.join('\n');
    }

    function syncLanguageFields() {
      const wrap = document.getElementById('q08LanguagesWrap');
      const detail = document.getElementById('q08LanguagesDetail');
      const sel = document.getElementById('q08Language');
      if (!wrap || !sel) return;
      const multi = sel.value === 'multi';
      wrap.classList.toggle('hidden', !multi);
      if (detail) detail.required = multi;
    }

    function setStatus(key, type) {
      status.textContent = t().status[key] || '';
      status.className = 'status' + (type ? ' ' + type : '');
    }

    document.getElementById('langRu').addEventListener('click', () => setLocale('ru'));
    document.getElementById('langEn').addEventListener('click', () => setLocale('en'));

    form.addEventListener('input', () => {
      try { localStorage.setItem(FORM_ID, JSON.stringify(collectData())); } catch (_) {}
    });
    document.getElementById('q08Language')?.addEventListener('change', () => {
      syncLanguageFields();
      try { localStorage.setItem(FORM_ID, JSON.stringify(collectData())); } catch (_) {}
    });

    document.getElementById('btnLink').addEventListener('click', async () => {
      const data = collectData();
      const { url } = { url: baseUrl + HASH_PREFIX + encodePayload(data) };
      if (url.length > 12000) {
        setStatus('urlLong', 'err');
        return;
      }
      try {
        await navigator.clipboard.writeText(url);
        history.replaceState(null, '', url);
        setStatus('copied', 'ok');
      } catch {
        prompt(t().promptCopy, url);
        history.replaceState(null, '', url);
        setStatus('copyManual', 'ok');
      }
    });

    document.getElementById('btnMd').addEventListener('click', () => {
      const data = collectData();
      const blob = new Blob([toMarkdown(data)], { type: 'text/markdown;charset=utf-8' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `landing-brief-${(data.q09_brand || 'client').replace(/\s+/g, '-').slice(0, 40)}.md`;
      a.click();
      URL.revokeObjectURL(a.href);
      setStatus('mdDone', 'ok');
    });

    document.getElementById('btnClear').addEventListener('click', () => {
      if (!confirm(t().confirmClear)) return;
      form.reset();
      localStorage.removeItem(FORM_ID);
      history.replaceState(null, '', baseUrl);
      filledBanner.classList.remove('show');
      setStatus('cleared', 'ok');
    });

    if (location.hash.startsWith(HASH_PREFIX)) {
      const data = decodePayload(location.hash.slice(HASH_PREFIX.length));
      if (data) {
        applyData(data);
        filledBanner.classList.add('show');
        setStatus('loaded', 'ok');
      }
    } else {
      try {
        const saved = localStorage.getItem(FORM_ID) || localStorage.getItem('landing-brief-v1');
        if (saved) applyData(JSON.parse(saved));
      } catch (_) {}
    }

    setLocale(locale);
  </script>
</body>
</html>
